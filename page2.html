    <style>
        *{  
        padding: 0%;
        margin: 0%;
        box-sizing: border-box;
        font-family: "Tektur", sans-serif;
        scroll-margin: 100px;
        }

        body{
            background-color: gray;
            color:white;
        }
           
        #profile{
            display:flex;
            flex-direction: row;
        }

        header{
            position: fixed;
            top: 0px;
            height: 100px;
            width: 100%;
            background: linear-gradient(to right,#00b4d8,#5e60ce);
            display:flex;
            flex-direction: row;
            justify-content: space-between;
        }

        #navigation-button{
            font-family: sans-serif;
            font-size: 60px;
            cursor: pointer;
        }

        #navigation-button:hover{
            font-size: 65px;
        }
        nav{
        display: none;
        background-color: #5e60ce; 
        width: 300px;
        height: 300px;
        position: absolute;
        top:100px;
        right:0px;
        border-bottom-left-radius: 10px;
        }
        .nav-option{
            text-decoration: none;
            color: white;
        }
        .nav-option-container{
            display: flex;
            flex-direction: row;
            align-items: center;
            height:50px;
            gap: 10px;
        }
        .nav-option-container:hover{
            background-color: blue;
        }

        .heading{
            color: #5e60ce;
        }
        #house-project-pictures-container{
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 150px;
            margin-bottom: 100px;
        }
        
        footer{
            height: 200px;
            background-color: black;
            color: white;
        }

        #socials{
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #social-icons-container{
            display: flex;
            flex-direction: row;
            gap: 10px;
        }
        .social-icon{
            color:white;
            
        }

        @media (max-width:600px) {
        #profile{
            margin-left: 20px;
        }
        #navigation-button{
            font-size: 30px;
            margin-right: 20px;
        }
        #navigation-button:hover{
            font-size: 35px;

        }
        .nav-option-container{
            height:30px;
           
        }
         nav{
            font-size: 10px;
            width: 180px;
            height: 180px;
            position: absolute;
            top:100px;
            right:0px;
            border-bottom-left-radius: 10px;
        }
  
        }
        @media (min-width:601px) and (max-width: 1200px) {
        #project-list-container{
            display: grid;
            grid-template-columns: 50% 50%;
            align-items: center;
            gap: 10px;
        }  
        }
       

    </style>
</head>
<body>

     <script src="https://kit.fontawesome.com/f7df50b970.js" crossorigin="anonymous"></script>

    <script>
        let navigationButton = document.querySelector("#navigation-button");
        let navigationBar = document.querySelector("nav");
        let navigationOptionContainers = document.querySelectorAll(".nav-option-container")
       

        navigationButton.addEventListener("click",
            function(){
                if (navigationButton.textContent === "≡"){
                    navigationBar.style.display = "block"
                    navigationButton.textContent = "X"
                }
                else{
                    navigationBar.style.display = "none"
                    navigationButton.textContent = "≡"
                }
            }
        )

        navigationOptionContainers.forEach(element => {
            element.addEventListener("click",
                function(){
                    navigationBar.style.display = "none";
                    navigationButton.textContent = "≡"
                }
            )
        });

    </script>
